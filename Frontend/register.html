<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniMarket - Registro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --color-primary: #1a2a4a;
            --color-primary-light: #2c4a7a;
            --color-primary-dark: #0f1a2e;
            --color-secondary: #2ecc71;
            --color-secondary-dark: #27ae60;
            --color-danger: #e74c3c;
            --color-text-light: #7f8c8d;
            --color-card: #ffffff;
            --shadow: 0 15px 50px rgba(0, 0, 0, 0.15);
            --radius: 16px;
            --transition: 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, var(--color-primary-dark), var(--color-primary), var(--color-primary-light));
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .card-auth {
            background: var(--color-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 440px;
            padding: 2.2rem 2rem;
        }

        .logo {
            text-align: center;
            margin-bottom: 1.8rem;
        }

        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            background: linear-gradient(145deg, var(--color-secondary), var(--color-secondary-dark));
            border-radius: 50%;
            color: #fff;
            font-size: 2.2rem;
            box-shadow: 0 8px 25px rgba(46, 204, 113, 0.3);
        }

        .logo-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--color-primary);
            margin: 0.4rem 0 0.1rem;
        }

        .logo-subtitle {
            font-size: 0.8rem;
            color: var(--color-text-light);
        }

        .form-label {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--color-primary);
            margin-bottom: 0.25rem;
        }

        .form-label .required {
            color: var(--color-danger);
            margin-left: 2px;
        }

        .input-group-text {
            background: #f8fafc;
            border: 2px solid #e8edf3;
            border-right: none;
            border-radius: 10px 0 0 10px;
            color: var(--color-text-light);
            padding: 0.5rem 0.8rem;
        }

        .form-control {
            border: 2px solid #e8edf3;
            border-radius: 10px;
            padding: 0.55rem 0.9rem;
            background: #f8fafc;
            transition: all var(--transition);
        }

        .input-group .form-control {
            border-radius: 0 10px 10px 0;
            border-left: none;
        }

        .form-control:focus {
            border-color: var(--color-primary-light);
            box-shadow: 0 0 0 4px rgba(44, 74, 122, 0.08);
            background: #fff;
        }

        .btn-primary-custom {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 0.7rem;
            font-weight: 600;
            font-size: 0.95rem;
            color: #fff;
            background: linear-gradient(145deg, var(--color-secondary), var(--color-secondary-dark));
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(46, 204, 113, 0.3);
            transition: all var(--transition);
            cursor: pointer;
        }

        .btn-primary-custom:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(46, 204, 113, 0.4);
        }

        .btn-primary-custom:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--color-text-light);
            cursor: pointer;
            padding: 4px;
            z-index: 5;
        }

        .toggle-password:hover {
            color: var(--color-primary);
        }

        .password-field {
            padding-right: 40px;
        }

        .msg {
            padding: 0.6rem 0.8rem;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-top: 0.8rem;
            display: none;
        }

        .msg-info {
            display: block;
            background: #e8f4fd;
            color: #1a5276;
            border: 1px solid #aed6f1;
        }

        .msg-success {
            display: block;
            background: #eafaf1;
            color: #1a7a4a;
            border: 1px solid #82e0aa;
        }

        .msg-error {
            display: block;
            background: #fdedec;
            color: #922b21;
            border: 1px solid #f5b7b1;
        }

        .action-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0.6rem;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.85rem;
            transition: all var(--transition);
            color: var(--color-primary);
            background: #f0f4f8;
            border: 2px solid #e8edf3;
            margin-top: 1rem;
        }

        .action-link:hover {
            background: #e8f0fe;
            border-color: var(--color-primary-light);
            transform: translateY(-2px);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.2rem 0;
            color: var(--color-text-light);
            font-size: 0.75rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e8edf3;
        }

        @media (max-width: 480px) {
            .card-auth { padding: 1.5rem 1.2rem; }
            .logo-icon { width: 60px; height: 60px; font-size: 1.8rem; }
            .logo-title { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <div class="card-auth">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-store"></i></div>
            <div class="logo-title">MiniMarket</div>
            <div class="logo-subtitle">Crear Cuenta</div>
        </div>

        <form id="registerForm">
            <div class="mb-3">
                <label class="form-label">
                    <i class="fas fa-user" style="color: var(--color-primary-light);"></i>
                    Nombre Completo <span class="required">*</span>
                </label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control" id="regName" placeholder="Juan Pérez" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    <i class="fas fa-envelope" style="color: var(--color-primary-light);"></i>
                    Correo Electrónico <span class="required">*</span>
                </label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" class="form-control" id="regEmail" placeholder="usuario@email.com" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    <i class="fas fa-user-tag" style="color: var(--color-primary-light);"></i>
                    Nombre de Usuario <span class="required">*</span>
                </label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control" id="regUsername" placeholder="usuario123" required minlength="3">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    <i class="fas fa-key" style="color: var(--color-primary-light);"></i>
                    Contraseña <span class="required">*</span>
                </label>
                <div class="input-group" style="position: relative;">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control password-field" id="regPassword"
                           placeholder="Mínimo 6 caracteres" required minlength="6">
                    <button type="button" class="toggle-password" onclick="togglePass('regPassword')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <small id="passHelp" class="text-muted" style="font-size:0.75rem;">
                    <i class="fas fa-info-circle"></i> Mínimo 6 caracteres
                </small>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    <i class="fas fa-check-circle" style="color: var(--color-primary-light);"></i>
                    Confirmar Contraseña <span class="required">*</span>
                </label>
                <div class="input-group" style="position: relative;">
                    <span class="input-group-text"><i class="fas fa-check"></i></span>
                    <input type="password" class="form-control password-field" id="regConfirm"
                           placeholder="Repite la contraseña" required>
                    <button type="button" class="toggle-password" onclick="togglePass('regConfirm')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-primary-custom" id="registerBtn">
                <i class="fas fa-user-plus"></i> Crear Cuenta
            </button>

            <div id="registerMsg" class="msg"></div>
        </form>

        <div class="divider">
            <i class="fas fa-shield-alt" style="color: var(--color-secondary);"></i>
            Sistema Seguro
        </div>

        <a href="login.html" class="action-link">
            <i class="fas fa-arrow-left"></i> ¿Ya tienes cuenta? Inicia sesión
        </a>
    </div>

    <script>
        // =============================================================
        // UTILITIES
        // =============================================================
        function togglePass(id) {
            const input = document.getElementById(id);
            const icon = input.parentElement.querySelector('.toggle-password i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        function showMsg(el, msg, type) {
            el.textContent = msg;
            el.className = 'msg msg-' + type;
        }

        function setLoading(btn, loading) {
            btn.disabled = loading;
            btn.innerHTML = loading
                ? '<span class="spinner-border spinner-border-sm" role="status"></span> Procesando...'
                : btn.dataset.original;
        }

        // Guardar texto original del botón
        document.getElementById('registerBtn').dataset.original = document.getElementById('registerBtn').innerHTML;

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        // =============================================================
        // REGISTRO
        // =============================================================
        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            const msg = document.getElementById('registerMsg');
            const btn = document.getElementById('registerBtn');

            if (!name || !email || !username || !password || !confirm) {
                showMsg(msg, '❌ Completa todos los campos.', 'error');
                return;
            }

            if (!emailRegex.test(email)) {
                showMsg(msg, '❌ Correo electrónico inválido.', 'error');
                return;
            }

            if (username.length < 3) {
                showMsg(msg, '❌ El nombre de usuario debe tener al menos 3 caracteres.', 'error');
                return;
            }

            if (password.length < 6) {
                showMsg(msg, '❌ La contraseña debe tener al menos 6 caracteres.', 'error');
                return;
            }

            if (password !== confirm) {
                showMsg(msg, '❌ Las contraseñas no coinciden.', 'error');
                return;
            }

            setLoading(btn, true);
            showMsg(msg, '⏳ Creando cuenta...', 'info');

            try {
                const res = await fetch('http://localhost:5285/api/Auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        nombreCompleto: name,
                        email: email,
                        username: username,
                        password: password,
                        confirmPassword: confirm
                    })
                });

                const data = await res.json();

                if (!res.ok) {
                    showMsg(msg, '❌ ' + (data.message || data.title || 'Error al registrar'), 'error');
                    setLoading(btn, false);
                    return;
                }

                showMsg(msg, '✅ ¡Registro exitoso! Redirigiendo al login...', 'success');

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            } catch (error) {
                console.error('Error:', error);
                showMsg(msg, '❌ Error de conexión. Verifica el servidor en http://localhost:5285', 'error');
                setLoading(btn, false);
            }
        });

        // =============================================================
        // VALIDACIÓN EN TIEMPO REAL
        // =============================================================
        document.getElementById('regPassword').addEventListener('input', function () {
            const help = document.getElementById('passHelp');
            if (this.value.length >= 6) {
                help.style.color = '#27ae60';
                help.innerHTML = '<i class="fas fa-check-circle"></i> Contraseña válida';
            } else {
                help.style.color = '';
                help.innerHTML = '<i class="fas fa-info-circle"></i> Mínimo 6 caracteres';
            }
        });

        document.getElementById('regConfirm').addEventListener('input', function () {
            const pass = document.getElementById('regPassword').value;
            if (this.value === pass && this.value.length >= 6) {
                this.style.borderColor = '#27ae60';
            } else if (this.value.length > 0) {
                this.style.borderColor = '#e74c3c';
            } else {
                this.style.borderColor = '';
            }
        });

        document.querySelectorAll('#regName, #regEmail, #regUsername, #regPassword, #regConfirm').forEach(el => {
            el.addEventListener('input', () => {
                const msg = document.getElementById('registerMsg');
                msg.className = 'msg';
                msg.textContent = '';
            });
        });

        console.log('%c🛒 MiniMarket - Registro', 'font-size:18px; font-weight:bold; color:#2ecc71;');
        console.log('%c🔗 API: http://localhost:5285', 'color:#7f8c8d;');
    </script>

</body>
</html>
