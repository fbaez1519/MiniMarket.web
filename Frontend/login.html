<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MiniMarket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body">
                    <h3 class="text-center mb-4">🔐 Iniciar Sesión</h3>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" value="admin@minimarket.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="password" value="admin123" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Ingresar</button>
                        <div id="statusMsg" class="mt-3 text-center"></div>
                    </form>
                    <div class="text-center mt-3"><a href="register.html">¿No tienes cuenta? Regístrate</a></div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const statusMsg = document.getElementById("statusMsg");

    statusMsg.innerHTML = '<span class="text-info">⏳ Conectando...</span>';

    if (!email || !password) {
        statusMsg.innerHTML = '<span class="text-danger">❌ Completa todos los campos.</span>';
        return;
    }

    try {
        const response = await fetch("http://localhost:5285/api/Auth/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
            statusMsg.innerHTML = '<span class="text-danger">❌ ' + (data.message || data.title || "Credenciales inválidas") + '</span>';
            return;
        }

        localStorage.setItem("token", data.token);
        localStorage.setItem("usuario", data.usuario);
        localStorage.setItem("rol", data.rol);

        statusMsg.innerHTML = '<span class="text-success">✅ Login exitoso. Redirigiendo...</span>';

        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 1500);

    } catch (error) {
        console.error("Error:", error);
        statusMsg.innerHTML = '<span class="text-danger">❌ Error de conexión. Asegúrate de que el servidor esté corriendo en http://localhost:5285</span>';
    }
});
</script>
</body>
</html>
